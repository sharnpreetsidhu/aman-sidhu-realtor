<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Property Match | Aman Sidhu</title>
  <link rel="stylesheet" href="ai-buyer-match.css" />
</head>
<body>

  <main class="ai-page">
    <section class="ai-shell">
      <a href="index.html" class="back-link">← Back to website</a>

      <div class="ai-header">
   <p class="eyebrow">Smart Property Match</p>
<h1>See what type of home may fit your budget.</h1>
      <p>
  Enter your budget, down payment, monthly comfort range, bedrooms, and preferred areas. This tool will suggest realistic property types and areas to explore.
</p>
      </div>

      <div class="ai-card">
        <div class="progress-wrap">
          <div class="progress-bar" id="progressBar"></div>
        </div>

        <div id="questionBox"></div>

        <div class="ai-actions">
          <button id="backBtn">Back</button>
          <button id="nextBtn">Next</button>
        </div>
      </div>

      <div id="resultBox" class="result-box hidden"></div>
    </section>
  </main>

  <script src="ai-buyer-match.js"></script>
</body>
</html>
